spring.application.name=notification-service

server.address=${NOTIFICATION_SERVICE_HOST:0.0.0.0}
server.port=${NOTIFICATION_SERVICE_PORT:8006}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

notification.rabbit.exchange=${NOTIFICATION_EXCHANGE:employee.events}
notification.rabbit.queue=${NOTIFICATION_QUEUE:notification-service-queue}
notification.rabbit.routing-key=${NOTIFICATION_ROUTING_KEY:employee.#}
notification.rabbit.client-routing-key=${NOTIFICATION_CLIENT_ROUTING_KEY:client.#}
notification.rabbit.card-routing-key=${NOTIFICATION_CARD_ROUTING_KEY:card.#}
notification.rabbit.credit-routing-key=${NOTIFICATION_CREDIT_ROUTING_KEY:credit.#}
notification.rabbit.order-routing-key=${NOTIFICATION_ORDER_ROUTING_KEY:order.#}
notification.rabbit.tax-routing-key=${NOTIFICATION_TAX_ROUTING_KEY:tax.#}

notification.retry.max-retries=${NOTIFICATION_RETRY_MAX_RETRIES:4}
notification.retry.delay-seconds=${NOTIFICATION_RETRY_DELAY_SECONDS:5}
notification.retry.scheduler-delay-millis=${NOTIFICATION_RETRY_SCHEDULER_DELAY_MILLIS:1000}

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:notification_db}

spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.auto-startup=${RABBITMQ_LISTENER_ENABLED:true}
spring.rabbitmq.listener.simple.prefetch=10

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
management.endpoint.health.show-details=never
management.health.mail.enabled=true

# Email templates
notification.templates.EMPLOYEE_CREATED.subject=Activation Email
notification.templates.EMPLOYEE_CREATED.body-template=Zdravo {{name}}, vas nalog je kreiran. Aktivirajte nalog klikom na link:\n{{activationLink}}
notification.templates.EMPLOYEE_PASSWORD_RESET.subject=Password Reset Email
notification.templates.EMPLOYEE_PASSWORD_RESET.body-template=Zdravo {{name}}, resetujte lozinku klikom na link:\n{{resetLink}}
notification.templates.EMPLOYEE_ACCOUNT_DEACTIVATED.subject=Account Deactivation Email
notification.templates.EMPLOYEE_ACCOUNT_DEACTIVATED.body-template=Zdravo {{name}}, vas nalog je deaktiviran.

notification.templates.CLIENT_CREATED.subject=Client Account Activation Email
notification.templates.CLIENT_CREATED.body-template=Zdravo {{name}}, vas klijentski nalog je kreiran. Aktivirajte nalog klikom na link:\n{{activationLink}}
notification.templates.CLIENT_PASSWORD_RESET.subject=Client Password Reset Email
notification.templates.CLIENT_PASSWORD_RESET.body-template=Zdravo {{name}}, resetujte lozinku klikom na link:\n{{resetLink}}
notification.templates.CLIENT_ACCOUNT_DEACTIVATED.subject=Client Account Deactivation Email
notification.templates.CLIENT_ACCOUNT_DEACTIVATED.body-template=Zdravo {{name}}, vas klijentski nalog je deaktiviran.
notification.templates.VERIFICATION_OTP.subject=Verifikacioni kod
notification.templates.VERIFICATION_OTP.body-template=Vas verifikacioni kod je: {{code}}

notification.templates.CARD_REQUEST_VERIFICATION.subject=Card Verification Code
notification.templates.CARD_REQUEST_VERIFICATION.body-template=Zdravo {{name}}, kod za verifikaciju zahteva za karticu {{cardName}} na racunu {{accountNumber}} je: {{verificationCode}}
notification.templates.CARD_REQUEST_SUCCESS.subject=Card Request Completed
notification.templates.CARD_REQUEST_SUCCESS.body-template=Zdravo {{name}}, uspesno je kreirana vasa kartica {{cardName}} za racun {{accountNumber}} sa brojem {{cardNumber}}.
notification.templates.CARD_REQUEST_FAILURE.subject=Card Request Failed
notification.templates.CARD_REQUEST_FAILURE.body-template=Zdravo {{name}}, zahtev za kreiranje kartice {{cardName}} za racun {{accountNumber}} nije uspesno zavrsen. Razlog: {{reason}}
notification.templates.CARD_BLOCKED.subject=Card Blocked
notification.templates.CARD_BLOCKED.body-template=Zdravo {{name}}, vasa kartica {{cardName}} za racun {{accountNumber}} sa brojem {{cardNumber}} je blokirana.
notification.templates.CARD_UNBLOCKED.subject=Card Unblocked
notification.templates.CARD_UNBLOCKED.body-template=Zdravo {{name}}, vasa kartica {{cardName}} za racun {{accountNumber}} sa brojem {{cardNumber}} je ponovo aktivna.
notification.templates.CARD_DEACTIVATED.subject=Card Deactivated
notification.templates.CARD_DEACTIVATED.body-template=Zdravo {{name}}, vasa kartica {{cardName}} za racun {{accountNumber}} sa brojem {{cardNumber}} je deaktivirana.
notification.templates.CREDIT_APPROVED.subject=Credit Request Approved
notification.templates.CREDIT_APPROVED.body-template=Zdravo {{name}}, vas kreditni zahtev sa identifikatorom {{creditId}} je odobren. Odobren iznos: {{approvedAmount}}.
notification.templates.CREDIT_DECLINED.subject=Credit Request Declined
notification.templates.CREDIT_DECLINED.body-template=Zdravo {{name}}, vas kreditni zahtev sa identifikatorom {{creditId}} je odbijen.
notification.templates.CREDIT_INSTALLMENT_FAILED.subject=Installment Charge Failed
notification.templates.CREDIT_INSTALLMENT_FAILED.body-template=Zdravo {{name}}, naplata rate za kredit {{creditId}} nije uspela. Dospeli iznos: {{installmentAmount}}. Pokusacemo ponovo za {{hours}}h.
notification.templates.ORDER_APPROVED.subject=Order Approved
notification.templates.ORDER_APPROVED.body-template=Zdravo {{name}}, order {{orderId}} za listing {{listingId}} je odobren. Tip: {{orderType}}, smer: {{direction}}, supervisor: {{supervisorId}}.
notification.templates.ORDER_DECLINED.subject=Order Declined
notification.templates.ORDER_DECLINED.body-template=Zdravo {{name}}, order {{orderId}} za listing {{listingId}} je odbijen. Tip: {{orderType}}, smer: {{direction}}, supervisor: {{supervisorId}}.
notification.templates.TAX_COLLECTED.subject=Tax Collected
notification.templates.TAX_COLLECTED.body-template=Zdravo {{name}}, naplacen je porez za listing {{listingId}}. Transakcija: {{transactionId}}, porez: {{tax}}, porez u RSD: {{taxRsd}}.


# RabbitMQ routing keys
notification.routing-keys.employee.created=EMPLOYEE_CREATED
notification.routing-keys.employee.password_reset=EMPLOYEE_PASSWORD_RESET
notification.routing-keys.employee.account_deactivated=EMPLOYEE_ACCOUNT_DEACTIVATED

notification.routing-keys.client.created=CLIENT_CREATED
notification.routing-keys.client.password_reset=CLIENT_PASSWORD_RESET
notification.routing-keys.client.account_deactivated=CLIENT_ACCOUNT_DEACTIVATED
notification.routing-keys.client.verification=VERIFICATION_OTP

notification.routing-keys.card.request_verification=CARD_REQUEST_VERIFICATION
notification.routing-keys.card.request_success=CARD_REQUEST_SUCCESS
notification.routing-keys.card.request_failure=CARD_REQUEST_FAILURE
notification.routing-keys.card.blocked=CARD_BLOCKED
notification.routing-keys.card.unblocked=CARD_UNBLOCKED
notification.routing-keys.card.deactivated=CARD_DEACTIVATED
notification.routing-keys.credit.approved=CREDIT_APPROVED
notification.routing-keys.credit.declined=CREDIT_DECLINED
notification.routing-keys.credit.installment_failed=CREDIT_INSTALLMENT_FAILED
notification.routing-keys.order.approved=ORDER_APPROVED
notification.routing-keys.order.declined=ORDER_DECLINED
notification.routing-keys.tax.collected=TAX_COLLECTED
