openapi: 3.1.0
info:
  title: Stock Service API
  description: API for stock exchange and market data management
  version: "1.0"
servers:
  - url: http://localhost/stock
    description: Generated server url
security:
  - bearerAuth: []
paths:
  /api/stock-exchanges/{id}/toggle-active:
    put:
      tags:
        - stock-exchange-controller
      operationId: toggleStockExchangeActive
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/StockExchangeToggleResponse"
  /api/listings/{id}/refresh:
    post:
      tags:
        - listing-controller
      operationId: refreshListing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ListingRefreshResponse"
  /admin/stocks/{ticker}/refresh-market-data:
    post:
      tags:
        - stock-market-data-admin-controller
      operationId: refreshStockMarketData
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/StockMarketDataRefreshResponse"
  /admin/stock-exchanges/import:
    post:
      tags:
        - stock-exchange-admin-controller
      operationId: importStockExchanges
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/StockExchangeImportResponse"
  /info:
    get:
      tags:
        - stock-info-controller
      operationId: info
      parameters:
        - name: X-Forwarded-Prefix
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/StockServiceInfoResponse"
  /exchange/info:
    get:
      tags:
        - stock-info-controller
      operationId: exchangeInfo
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ExchangeServiceInfoResponse"
  /api/stock-exchanges:
    get:
      tags:
        - stock-exchange-controller
      operationId: getStockExchanges
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockExchangeResponse"
  /api/stock-exchanges/{id}/is-open:
    get:
      tags:
        - stock-exchange-controller
      operationId: getStockExchangeStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/StockExchangeStatusResponse"
  /api/listings/{id}:
    get:
      tags:
        - listing-controller
      operationId: getListingDetails
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum:
              - DAY
              - WEEK
              - MONTH
              - YEAR
              - FIVE_YEARS
              - ALL
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ListingDetailsResponse"
  /api/listings/stocks:
    get:
      tags:
        - listing-controller
      operationId: getStockListings
      parameters:
        - name: filter
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ListingFilterRequest"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: ticker
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            default: asc
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/PageListingSummaryResponse"
  /api/listings/futures:
    get:
      tags:
        - listing-controller
      operationId: getFuturesListings
      parameters:
        - name: filter
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ListingFilterRequest"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: ticker
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            default: asc
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/PageListingSummaryResponse"
  /api/listings/forex:
    get:
      tags:
        - listing-controller
      operationId: getForexListings
      parameters:
        - name: filter
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ListingFilterRequest"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: ticker
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            default: asc
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/PageListingSummaryResponse"
components:
  schemas:
    StockExchangeToggleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        exchangeName:
          type: string
        exchangeMICCode:
          type: string
        isActive:
          type: boolean
    ListingRefreshResponse:
      type: object
      properties:
        listingId:
          type: integer
          format: int64
        ticker:
          type: string
        listingType:
          type: string
          enum:
            - STOCK
            - FUTURES
            - FOREX
        dailySnapshotDate:
          type: string
          format: date
        lastRefresh:
          type: string
          format: date-time
    StockMarketDataRefreshResponse:
      type: object
      properties:
        ticker:
          type: string
        stockId:
          type: integer
          format: int64
        listingId:
          type: integer
          format: int64
        refreshedDailyEntries:
          type: integer
          format: int32
        lastRefresh:
          type: string
          format: date-time
    StockExchangeImportResponse:
      type: object
      properties:
        source:
          type: string
        processedRows:
          type: integer
          format: int32
        createdCount:
          type: integer
          format: int32
        updatedCount:
          type: integer
          format: int32
        unchangedCount:
          type: integer
          format: int32
    StockServiceInfoResponse:
      type: object
      properties:
        service:
          type: string
        status:
          type: string
        gatewayPrefix:
          type: string
        exchangeServiceBaseUrl:
          type: string
        marketDataBaseUrl:
          type: string
        marketDataApiKeyConfigured:
          type: boolean
    ExchangeServiceInfoResponse:
      type: object
      properties:
        service:
          type: string
        status:
          type: string
        gatewayPrefix:
          type: string
    StockExchangeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        exchangeName:
          type: string
        exchangeAcronym:
          type: string
        exchangeMICCode:
          type: string
        polity:
          type: string
        currency:
          type: string
        timeZone:
          type: string
        openTime:
          type: string
        closeTime:
          type: string
        preMarketOpenTime:
          type: string
        preMarketCloseTime:
          type: string
        postMarketOpenTime:
          type: string
        postMarketCloseTime:
          type: string
        isActive:
          type: boolean
    StockExchangeStatusResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        exchangeName:
          type: string
        exchangeAcronym:
          type: string
        exchangeMICCode:
          type: string
        polity:
          type: string
        timeZone:
          type: string
        localDate:
          type: string
          format: date
        localTime:
          type: string
        openTime:
          type: string
        closeTime:
          type: string
        preMarketOpenTime:
          type: string
        preMarketCloseTime:
          type: string
        postMarketOpenTime:
          type: string
        postMarketCloseTime:
          type: string
        isActive:
          type: boolean
        workingDay:
          type: boolean
        holiday:
          type: boolean
        open:
          type: boolean
        regularMarketOpen:
          type: boolean
        testModeBypassEnabled:
          type: boolean
        marketPhase:
          type: string
          enum:
            - CLOSED
            - PRE_MARKET
            - REGULAR_MARKET
            - POST_MARKET
    ListingDailyPriceInfoResponse:
      type: object
      properties:
        date:
          type: string
          format: date
        price:
          type: number
        ask:
          type: number
        bid:
          type: number
        change:
          type: number
        changePercent:
          type: number
        volume:
          type: integer
          format: int64
        dollarVolume:
          type: number
    ListingDetailsResponse:
      type: object
      properties:
        listingId:
          type: integer
          format: int64
        securityId:
          type: integer
          format: int64
        listingType:
          type: string
          enum:
            - STOCK
            - FUTURES
            - FOREX
        ticker:
          type: string
        name:
          type: string
        stockExchangeId:
          type: integer
          format: int64
        exchangeMICCode:
          type: string
        exchangeAcronym:
          type: string
        exchangeName:
          type: string
        lastRefresh:
          type: string
          format: date-time
        price:
          type: number
        ask:
          type: number
        bid:
          type: number
        change:
          type: number
        changePercent:
          type: number
        volume:
          type: integer
          format: int64
        dollarVolume:
          type: number
        initialMarginCost:
          type: number
        requestedPeriod:
          type: string
          enum:
            - DAY
            - WEEK
            - MONTH
            - YEAR
            - FIVE_YEARS
            - ALL
        priceHistory:
          type: array
          items:
            $ref: "#/components/schemas/ListingDailyPriceInfoResponse"
        stockDetails:
          $ref: "#/components/schemas/ListingStockDetailsResponse"
        futuresDetails:
          $ref: "#/components/schemas/ListingFuturesDetailsResponse"
        forexDetails:
          $ref: "#/components/schemas/ListingForexDetailsResponse"
        optionGroups:
          type: array
          items:
            $ref: "#/components/schemas/StockOptionSettlementGroupResponse"
    ListingForexDetailsResponse:
      type: object
      properties:
        baseCurrency:
          type: string
        quoteCurrency:
          type: string
        exchangeRate:
          type: number
        liquidity:
          type: string
          enum:
            - HIGH
            - MEDIUM
            - LOW
        contractSize:
          type: integer
          format: int32
    ListingFuturesDetailsResponse:
      type: object
      properties:
        contractSize:
          type: integer
          format: int32
        contractUnit:
          type: string
        settlementDate:
          type: string
          format: date
    ListingStockDetailsResponse:
      type: object
      properties:
        outstandingShares:
          type: integer
          format: int64
        dividendYield:
          type: number
        contractSize:
          type: integer
          format: int32
    StockOptionDetailsResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ticker:
          type: string
        optionType:
          type: string
          enum:
            - CALL
            - PUT
        strikePrice:
          type: number
        impliedVolatility:
          type: number
        openInterest:
          type: integer
          format: int32
        inTheMoney:
          type: boolean
    StockOptionSettlementGroupResponse:
      type: object
      properties:
        settlementDate:
          type: string
          format: date
        calls:
          type: array
          items:
            $ref: "#/components/schemas/StockOptionDetailsResponse"
        puts:
          type: array
          items:
            $ref: "#/components/schemas/StockOptionDetailsResponse"
    ListingFilterRequest:
      type: object
      properties:
        exchange:
          type: string
        search:
          type: string
        minPrice:
          type: number
        maxPrice:
          type: number
        minAsk:
          type: number
        maxAsk:
          type: number
        minBid:
          type: number
        maxBid:
          type: number
        minVolume:
          type: integer
          format: int64
        maxVolume:
          type: integer
          format: int64
        settlementDate:
          type: string
          format: date
    ListingSummaryResponse:
      type: object
      properties:
        listingId:
          type: integer
          format: int64
        listingType:
          type: string
          enum:
            - STOCK
            - FUTURES
            - FOREX
        ticker:
          type: string
        name:
          type: string
        exchangeMICCode:
          type: string
        price:
          type: number
        change:
          type: number
        volume:
          type: integer
          format: int64
        initialMarginCost:
          type: number
        settlementDate:
          type: string
          format: date
    PageListingSummaryResponse:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        numberOfElements:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ListingSummaryResponse"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        paged:
          type: boolean
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
    SortObject:
      type: object
      properties:
        sorted:
          type: boolean
        unsorted:
          type: boolean
        empty:
          type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
