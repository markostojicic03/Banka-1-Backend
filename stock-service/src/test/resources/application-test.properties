spring.datasource.url=jdbc:h2:mem:stock-service-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
management.otlp.metrics.export.enabled=false
stock.exchange-seed.enabled=false
stock.ticker-seed.enabled=false
stock.futures-seed.enabled=false
stock.forex-seed.enabled=false
stock.listing-refresh.enabled=false
stock.listing-refresh.interval-ms=900000
jwt.secret=test_secret_key_at_least_32_characters_long
