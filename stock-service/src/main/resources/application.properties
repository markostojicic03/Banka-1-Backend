spring.application.name=stock-service
spring.config.import=optional:file:./stock-service/.env[.properties],optional:file:./.env[.properties]
server.address=${STOCK_SERVICE_HOST:0.0.0.0}
server.port=${STOCK_SERVICE_PORT:8090}

jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/actuator/**,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/info

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/stock/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/stock/v3/api-docs
server.forward-headers-strategy=FRAMEWORK

spring.datasource.url=jdbc:postgresql://${STOCK_DB_HOST:localhost}:${STOCK_DB_PORT:5441}/${STOCK_DB_NAME:stock_db}
spring.datasource.username=${STOCK_DB_USER:postgres}
spring.datasource.password=${STOCK_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

company.observability.starter.user-id-mdc-enabled=true

stock.exchange-service.base-url=${STOCK_EXCHANGE_SERVICE_URL:http://localhost:8085}
stock.exchange-seed.enabled=${STOCK_EXCHANGE_SEED_ENABLED:true}
stock.exchange-seed.csv-location=${STOCK_EXCHANGE_SEED_CSV_LOCATION:classpath:seed/exchanges.csv}
stock.ticker-seed.enabled=${STOCK_TICKER_SEED_ENABLED:true}
stock.futures-seed.enabled=${STOCK_FUTURES_SEED_ENABLED:true}
stock.futures-seed.csv-location=${STOCK_FUTURES_SEED_CSV_LOCATION:classpath:seed/future_data.csv}
stock.forex-seed.enabled=${STOCK_FOREX_SEED_ENABLED:true}
stock.forex-seed.csv-location=${STOCK_FOREX_SEED_CSV_LOCATION:classpath:seed/forex_pairs_seed.csv}
stock.listing-refresh.enabled=${STOCK_LISTING_REFRESH_ENABLED:true}
stock.listing-refresh.interval-ms=${STOCK_LISTING_REFRESH_INTERVAL_MS:900000}
stock.market-data.base-url=${STOCK_MARKET_DATA_BASE_URL:https://www.alphavantage.co}
stock.market-data.api-key=${STOCK_MARKET_DATA_API_KEY:${ALPHA_VANTAGE_API_KEY:}}
stock.market-data.daily-history-limit=${STOCK_MARKET_DATA_DAILY_HISTORY_LIMIT:30}
