services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: card_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d card_db"]
      interval: 5s
      timeout: 3s
      retries: 15

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 15

  card-service:
    image: ci-test/card-service:latest
    environment:
      CARD_SERVER_PORT: 8087
      CARD_DB_HOST: postgres
      CARD_DB_PORT: 5432
      CARD_DB_NAME: card_db
      CARD_DB_USER: postgres
      CARD_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      NOTIFICATION_EXCHANGE: employee.events
      SERVICES_CLIENT_URL: http://client-service:8083
      SERVICES_ACCOUNT_URL: http://account-service:8084
      JWT_SECRET: ci-test-secret-that-is-long-enough-for-hmac
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
