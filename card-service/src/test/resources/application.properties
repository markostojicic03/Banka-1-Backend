# Test configuration using an H2 in-memory database
spring.datasource.url=jdbc:h2:mem:cardtestdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.liquibase.enabled=false
server.port=0

# JWT
jwt.secret=test-secret-key-that-is-long-enough-for-hmac-256-algorithm
banka.security.issuer=banka1
banka.security.id=id
banka.security.expiration-time=3600000
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/v3/api-docs/**,/swagger-ui/**

# RabbitMQ test values
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.simple.default-requeue-rejected=false
notification.rabbit.exchange=test-exchange
card.rabbit.auto.exchange=test-exchange
card.rabbit.auto.queue=test-card-auto-queue
card.rabbit.auto.routing-key=card.create
services.client.url=http://localhost:8083
services.account.url=http://localhost:8084
services.verification.url=http://localhost:8086
card.creation.automatic.default-limit=1000000

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
