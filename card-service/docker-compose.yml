services:
  postgres_card:
    image: postgres:16
    container_name: postgres_card
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CARD_DB_NAME}
      POSTGRES_USER: ${CARD_DB_USER}
      POSTGRES_PASSWORD: ${CARD_DB_PASSWORD}
    ports:
      - "${CARD_DB_EX_PORT}:${CARD_DB_INT_PORT}"
    volumes:
      - postgres_card_data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CARD_DB_USER} -d ${CARD_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:${RABBITMQ_PORT}"
      - "${RABBITMQ_MANAGEMENT_PORT}:${RABBITMQ_MANAGEMENT_PORT}"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  card-service:
    build:
      context: ..
      dockerfile: card-service/Dockerfile
    container_name: card-service
    restart: unless-stopped
    depends_on:
      postgres_card:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      CARD_SERVER_PORT: ${CARD_SERVER_PORT}

      CARD_DB_HOST: ${CARD_DB_HOST}
      CARD_DB_PORT: ${CARD_DB_INT_PORT}
      CARD_DB_NAME: ${CARD_DB_NAME}
      CARD_DB_USER: ${CARD_DB_USER}
      CARD_DB_PASSWORD: ${CARD_DB_PASSWORD}

      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE}
      CARD_AUTO_EXCHANGE: ${CARD_AUTO_EXCHANGE}
      CARD_AUTO_QUEUE: ${CARD_AUTO_QUEUE:-card-service-auto-card-queue}
      CARD_AUTO_ROUTING_KEY: ${CARD_AUTO_ROUTING_KEY:-card.create}
      SERVICES_CLIENT_URL: ${SERVICES_CLIENT_URL:-http://localhost:8083}
      SERVICES_ACCOUNT_URL: ${SERVICES_ACCOUNT_URL}
      SERVICES_VERIFICATION_URL: ${SERVICES_VERIFICATION_URL:-http://localhost:8086}
      SERVICE_VERIFICATION_PORT: ${SERVICE_VERIFICATION_PORT:-8086}

      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${CARD_SERVER_PORT}:${CARD_SERVER_PORT}"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${CARD_SERVER_PORT}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_card_data:

networks:
  banka-network:
    driver: bridge
