services:
  postgres:
    image: postgres:15
    container_name: banka_clients_postgres_db
    ports:
      - "${CLIENT_SERVICE_DB_PORT:-5433}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${CLIENT_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${CLIENT_SERVICE_DB_PASSWORD}
      POSTGRES_DB: ${CLIENT_SERVICE_DB_NAME}
    volumes:
      - clients_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CLIENT_SERVICE_DB_USER} -d ${CLIENT_SERVICE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: banka_clients_rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15673:15672"
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  client-service:
    build:
      context: ..
      dockerfile: client-service/Dockerfile
    container_name: banka_client_service
    ports:
      - "${CLIENT_SERVICE_DOCKER_PORT:-8084}:${CLIENT_SERVICE_PORT:-8083}"
    env_file:
      - .env
    environment:
      CLIENT_SERVICE_DB_HOST: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${CLIENT_SERVICE_PORT:-8083}/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  clients_postgres_data:
