services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orderdb"]
      interval: 5s
      timeout: 3s
      retries: 15

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 15

  order-service:
    image: ci-test/order-service:latest
    environment:
      ORDER_SERVER_PORT: 8088
      ORDER_DB_HOST: postgres
      ORDER_DB_PORT: 5432
      ORDER_DB_NAME: orderdb
      ORDER_DB_USER: postgres
      ORDER_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_ROUTING_KEY: order.#
      JWT_SECRET: ci-test-secret-that-is-long-enough-for-hmac
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy