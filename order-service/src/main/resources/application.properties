spring.application.name=orderService
server.port=${ORDER_SERVER_PORT:8088}

# Security (JWT)
jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.expiration-time=3600000
banka.security.permit-all=/v3/api-docs/**, /v3/api-docs.yaml, /swagger-ui/**, /swagger-ui.html, /actuator/**, /hello

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Gateway integracija
server.forward-headers-strategy=FRAMEWORK

# Observability (OTEL)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

# RabbitMQ Base
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# RabbitMQ Routing Config
rabbitmq.queue=${NOTIFICATION_QUEUE:notification-service-queue}
rabbitmq.exchange=${NOTIFICATION_EXCHANGE:employee.events}
rabbitmq.routing-key=${NOTIFICATION_ROUTING_KEY:order.#}

# Database (Postgres)
spring.datasource.url=${ORDER_DATASOURCE_URL:jdbc:postgresql://${ORDER_DB_HOST:localhost}:${ORDER_DB_PORT:5432}/${ORDER_DB_NAME:orderdb}}
spring.datasource.username=${ORDER_DB_USER:postgres}
spring.datasource.password=${ORDER_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${ORDER_DB_DRIVER:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# External service URLs
services.account.url=http://${ACCOUNT_SERVICE_HOST:localhost}:${ACCOUNT_SERVER_PORT:8084}
services.employee.url=http://${EMPLOYEE_SERVICE_HOST:localhost}:${USER_SERVER_PORT:8081}
services.client.url=http://${CLIENT_SERVICE_HOST:localhost}:${CLIENT_SERVER_PORT:8083}
services.exchange.url=http://${EXCHANGE_SERVICE_HOST:localhost}:${EXCHANGE_SERVER_PORT:8085}
services.stock.url=http://${STOCK_SERVICE_HOST:localhost}:${STOCK_SERVICE_PORT:8090}
