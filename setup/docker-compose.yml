services:
  # Postgres for Notification Service
  postgres_notification:
    image: postgres:16
    container_name: postgres_notification_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notification_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_EX_PORT:-5433}:5432"
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-notification_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres for User Service
  postgres_user:
    image: postgres:16
    container_name: postgres_user_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-banka}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${USER_EX_PORT:-5434}:5432"
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-banka}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres for Client Service
  postgres_client:
    image: postgres:16
    container_name: postgres_client_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${CLIENT_SERVICE_DB_NAME:-clientdb}
      POSTGRES_USER: ${CLIENT_SERVICE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${CLIENT_SERVICE_DB_PASSWORD:-postgres}
    ports:
      - "${CLIENT_SERVICE_DB_EX_PORT:-5435}:5432"
    volumes:
      - postgres-client-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CLIENT_SERVICE_DB_USER:-postgres} -d ${CLIENT_SERVICE_DB_NAME:-clientdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres for Account Service
  postgres_account:
    image: postgres:16
    container_name: postgres_account_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${ACCOUNT_DB_NAME:-accountdb}
      POSTGRES_USER: ${ACCOUNT_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${ACCOUNT_DB_PASSWORD:-postgres}
    ports:
      - "${ACCOUNT_DB_EX_PORT:-5436}:5432"
    volumes:
      - postgres-account-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACCOUNT_DB_USER:-postgres} -d ${ACCOUNT_DB_NAME:-accountdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres for Card Service
  postgres_card:
    image: postgres:16
    container_name: postgres_card_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${CARD_DB_NAME:-card_db}
      POSTGRES_USER: ${CARD_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${CARD_DB_PASSWORD:-postgres}
    ports:
      - "${CARD_DB_EX_PORT:-5439}:5432"
    volumes:
      - postgres-card-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CARD_DB_USER:-postgres} -d ${CARD_DB_NAME:-card_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres for Transfer Service
  postgres_transfer:
    image: postgres:16
    container_name: postgres_transfer_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${TRANSFER_DB_NAME:-transferdb}
      POSTGRES_USER: ${TRANSFER_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TRANSFER_DB_PASSWORD:-postgres}
    ports:
      - "${TRANSFER_DB_EX_PORT:-5437}:5432"
    volumes:
      - postgres-transfer-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRANSFER_DB_USER:-postgres} -d ${TRANSFER_DB_NAME:-transferdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres for Exchange Service
  postgres_exchange:
    image: postgres:16
    container_name: postgres_exchange_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${EXCHANGE_DB_NAME:-exchange_db}
      POSTGRES_USER: ${EXCHANGE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${EXCHANGE_DB_PASSWORD:-postgres}
    ports:
      - "${EXCHANGE_DB_EX_PORT:-5440}:5432"
    volumes:
      - postgres-exchange-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EXCHANGE_DB_USER:-postgres} -d ${EXCHANGE_DB_NAME:-exchange_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres for Verification Service
  postgres_verification:
    image: postgres:16
    container_name: postgres_verification_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${VERIFICATION_DB_NAME:-verificationdb}
      POSTGRES_USER: ${VERIFICATION_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${VERIFICATION_DB_PASSWORD:-postgres}
    ports:
      - "${VERIFICATION_DB_EX_PORT:-5438}:5432"
    volumes:
      - postgres-verification-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VERIFICATION_DB_USER:-postgres} -d ${VERIFICATION_DB_NAME:-verificationdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Postgres for Stock Service
  postgres_stock:
    image: postgres:16
    container_name: postgres_stock_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${STOCK_DB_NAME:-stock_db}
      POSTGRES_USER: ${STOCK_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${STOCK_DB_PASSWORD:-postgres}
    ports:
      - "${STOCK_DB_EX_PORT:-5441}:5432"
    volumes:
      - postgres-stock-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STOCK_DB_USER:-postgres} -d ${STOCK_DB_NAME:-stock_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # RabbitMQ (shared)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: banka_rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector:0.104.0
    container_name: banka_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    expose:
      - "4318"
      - "8889"
    depends_on:
      - jaeger
    networks:
      - banka-network

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: banka_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    expose:
      - "4317"
    ports:
      - "16686:16686"
    networks:
      - banka-network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: banka_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - banka-network

  loki:
    image: grafana/loki:3.1.1
    container_name: banka_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - banka-network

  promtail:
    image: grafana/promtail:3.1.1
    container_name: banka_promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
      - notification-service-logs:/var/log/services/notification:ro
      - employee-service-logs:/var/log/services/employee:ro
      - client-service-logs:/var/log/services/client:ro
      - account-service-logs:/var/log/services/account:ro
      - card-service-logs:/var/log/services/card:ro
      - transfer-service-logs:/var/log/services/transfer:ro
      - exchange-service-logs:/var/log/services/exchange:ro
      - verification-service-logs:/var/log/services/verification:ro
      - transaction-service-logs:/var/log/services/transaction:ro
    depends_on:
      - loki
    networks:
      - banka-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: banka_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - jaeger
      - loki
    networks:
      - banka-network

  # Notification Service
  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
      args:
        SERVER_PORT: ${NOTIFICATION_SERVER_PORT:-8006}
    container_name: notification-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NOTIFICATION_SERVICE_HOST: ${NOTIFICATION_SERVICE_HOST:-0.0.0.0}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVER_PORT:-8006}
      SERVER_PORT: ${NOTIFICATION_SERVER_PORT:-8006}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres_notification}
      POSTGRES_DB: ${POSTGRES_DB:-notification_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: notification-service
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${NOTIFICATION_SERVER_PORT:-8006}"
    networks:
      - banka-network
    volumes:
      - notification-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${NOTIFICATION_SERVER_PORT:-8006}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Employee Service
  employee-service:
    build:
      context: ..
      dockerfile: employee-service/Dockerfile
      args:
        SERVER_PORT: ${USER_SERVER_PORT:-8081}
    container_name: banka_employee_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-postgres_user}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-banka}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RABBIT_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBIT_PORT: ${RABBITMQ_PORT:-5672}
      SERVER_PORT: ${USER_SERVER_PORT:-8081}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: employeeService
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${USER_SERVER_PORT:-8081}"
    networks:
      - banka-network
    volumes:
      - employee-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${USER_SERVER_PORT:-8081}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Client Service
  client-service:
    build:
      context: ..
      dockerfile: client-service/Dockerfile
      args:
        SERVER_PORT: ${CLIENT_SERVER_PORT:-8083}
    container_name: banka_client_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CLIENT_SERVICE_DB_HOST: postgres_client
      CLIENT_SERVICE_PORT: ${CLIENT_SERVER_PORT:-8083}
      SERVER_PORT: ${CLIENT_SERVER_PORT:-8083}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: clientService
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_client:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${CLIENT_SERVER_PORT:-8083}"
    networks:
      - banka-network
    volumes:
      - client-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${CLIENT_SERVER_PORT:-8083}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Account Service
  account-service:
    build:
      context: ..
      dockerfile: account-service/Dockerfile
      args:
        SERVER_PORT: ${ACCOUNT_SERVER_PORT:-8084}
    container_name: banka_account_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ACCOUNT_DB_HOST: ${ACCOUNT_DB_HOST}
      ACCOUNT_DB_PORT: ${ACCOUNT_DB_INTERNAL_PORT}
      ACCOUNT_DB_NAME: ${ACCOUNT_DB_NAME}
      ACCOUNT_DB_USER: ${ACCOUNT_DB_USER}
      ACCOUNT_DB_PASSWORD: ${ACCOUNT_DB_PASSWORD}
      ACCOUNT_SERVER_PORT: ${ACCOUNT_SERVER_PORT}
      SERVER_PORT: ${ACCOUNT_SERVER_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_USER_URL: ${SERVICES_USER_URL}
      CLIENT_SERVER_PORT: ${CLIENT_SERVER_PORT}
      SERVICES_CARD_URL: ${SERVICES_CARD_URL}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE}
      NOTIFICATION_ROUTING_KEY: ${NOTIFICATION_ROUTING_KEY}
      SERVICES_VERIFICATION_URL: ${SERVICES_VERIFICATION_URL}
      SERVICE_VERIFICATION_PORT: ${SERVICE_VERIFICATION_PORT}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: accountService
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_account:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "${ACCOUNT_SERVER_PORT:-8084}:${ACCOUNT_SERVER_PORT:-8084}"
    networks:
      - banka-network
    volumes:
      - account-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${ACCOUNT_SERVER_PORT:-8084}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Transfer Service
  transfer-service:
    build:
      context: ..
      dockerfile: transfer-service/Dockerfile
      args:
        SERVER_PORT: ${TRANSFER_SERVICE_PORT:-8085}
    container_name: banka_transfer_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: ${TRANSFER_SERVICE_PORT:-8085}
      DB_HOST: postgres_transfer
      DB_PORT: 5432
      DB_NAME: ${TRANSFER_DB_NAME:-transferdb}
      DB_USER: ${TRANSFER_DB_USER:-postgres}
      DB_PASSWORD: ${TRANSFER_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-notification-service-queue}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_ROUTING_KEY: ${NOTIFICATION_ROUTING_KEY:-employee.#}
      CLIENT_SERVICE_HOST: client-service
      CLIENT_SERVER_PORT: ${CLIENT_SERVER_PORT:-8083}
      ACCOUNT_SERVICE_HOST: account-service
      ACCOUNT_SERVER_PORT: ${ACCOUNT_SERVER_PORT:-8084}
      EXCHANGE_SERVICE_HOST: exchange-service
      EXCHANGE_SERVER_PORT: ${EXCHANGE_SERVER_PORT:-8085}
      VERIFICATION_SERVICE_HOST: verification-service
      SERVICES_VERIFICATION_URL: http://verification-service:${VERIFICATION_SERVER_PORT:-8086}
      VERIFICATION_SERVER_PORT: ${VERIFICATION_SERVER_PORT:-8086}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: transferService
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_transfer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${TRANSFER_SERVICE_PORT:-8085}"
    networks:
      - banka-network
    volumes:
      - transfer-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${TRANSFER_SERVICE_PORT:-8085}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Exchange Service
  exchange-service:
    build:
      context: ..
      dockerfile: exchange-service/Dockerfile
      args:
        SERVER_PORT: ${EXCHANGE_SERVER_PORT:-8085}
    container_name: exchange-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      EXCHANGE_SERVICE_HOST: 0.0.0.0
      EXCHANGE_SERVER_PORT: ${EXCHANGE_SERVER_PORT:-8085}
      EXCHANGE_DB_HOST: postgres_exchange
      EXCHANGE_DB_PORT: 5432
      EXCHANGE_DB_NAME: ${EXCHANGE_DB_NAME:-exchange_db}
      EXCHANGE_DB_USER: ${EXCHANGE_DB_USER:-postgres}
      EXCHANGE_DB_PASSWORD: ${EXCHANGE_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: exchange-service
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_exchange:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${EXCHANGE_SERVER_PORT:-8085}"
    networks:
      - banka-network
    volumes:
      - exchange-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${EXCHANGE_SERVER_PORT:-8085}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Transaction Service
  transaction-service:
    build:
      context: ..
      dockerfile: transaction-service/Dockerfile
      args:
        SERVER_PORT: ${TRANSACTION_SERVER_PORT:-8087}
    container_name: banka_transaction_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TRANSACTION_SERVER_PORT: ${TRANSACTION_SERVER_PORT}
      SERVER_PORT: ${TRANSACTION_SERVER_PORT}
      ACCOUNT_DB_HOST: ${ACCOUNT_DB_HOST}
      ACCOUNT_DB_PORT: ${ACCOUNT_DB_INTERNAL_PORT}
      ACCOUNT_DB_NAME: ${ACCOUNT_DB_NAME}
      ACCOUNT_DB_USER: ${ACCOUNT_DB_USER}
      ACCOUNT_DB_PASSWORD: ${ACCOUNT_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_USER_URL: ${SERVICES_USER_URL}
      CLIENT_SERVER_PORT: ${CLIENT_SERVER_PORT}
      SERVICES_VERIFICATION_URL: ${SERVICES_VERIFICATION_URL}
      SERVICE_VERIFICATION_PORT: ${SERVICE_VERIFICATION_PORT}
      SERVICES_EXCHANGE_URL: ${SERVICES_EXCHANGE_URL}
      SERVICE_EXCHANGE_PORT: ${EXCHANGE_SERVER_PORT}
      SERVICES_ACCOUNT_URL: ${SERVICES_ACCOUNT_URL}
      SERVICE_ACCOUNT_PORT: ${ACCOUNT_SERVER_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE}
      NOTIFICATION_ROUTING_KEY: ${NOTIFICATION_ROUTING_KEY}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: transaction-service
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_account:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      account-service:
        condition: service_healthy
      exchange-service:
        condition: service_healthy
      verification-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${TRANSACTION_SERVER_PORT:-8087}"
    networks:
      - banka-network
    volumes:
      - transaction-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${TRANSACTION_SERVER_PORT:-8087}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Verification Service
  verification-service:
    build:
      context: ..
      dockerfile: verification-service/Dockerfile
      args:
        SERVER_PORT: ${VERIFICATION_SERVER_PORT:-8086}
    container_name: banka_verification_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VERIFICATION_SERVER_PORT: ${VERIFICATION_SERVER_PORT:-8086}
      VERIFICATION_DB_HOST: postgres_verification
      VERIFICATION_DB_PORT: 5432
      VERIFICATION_DB_NAME: ${VERIFICATION_DB_NAME:-verificationdb}
      VERIFICATION_DB_USER: ${VERIFICATION_DB_USER:-postgres}
      VERIFICATION_DB_PASSWORD: ${VERIFICATION_DB_PASSWORD:-postgres}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-notification-service-queue}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_ROUTING_KEY: ${NOTIFICATION_ROUTING_KEY:-employee.#}
      JWT_SECRET: ${JWT_SECRET}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: verificationService
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_verification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${VERIFICATION_SERVER_PORT:-8086}"
    networks:
      - banka-network
    volumes:
      - verification-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${VERIFICATION_SERVER_PORT:-8086}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Card Service
  card-service:
    build:
      context: ..
      dockerfile: card-service/Dockerfile
      args:
        SERVER_PORT: ${CARD_SERVER_PORT:-8087}
    container_name: banka_card_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CARD_SERVER_PORT: ${CARD_SERVER_PORT:-8087}
      CARD_DB_HOST: postgres_card
      CARD_DB_PORT: ${CARD_DB_INTERNAL_PORT:-5432}
      CARD_DB_NAME: ${CARD_DB_NAME:-card_db}
      CARD_DB_USER: ${CARD_DB_USER:-postgres}
      CARD_DB_PASSWORD: ${CARD_DB_PASSWORD:-postgres}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-notification-service-queue}
      NOTIFICATION_EXCHANGE: ${NOTIFICATION_EXCHANGE:-employee.events}
      NOTIFICATION_CARD_ROUTING_KEY: ${NOTIFICATION_CARD_ROUTING_KEY:-card.#}
      SERVICES_CLIENT_URL: ${SERVICES_CLIENT_URL:-http://client-service:8083}
      SERVICES_ACCOUNT_URL: ${SERVICES_ACCOUNT_URL:-http://account-service:8084}
      SERVICES_VERIFICATION_URL: http://verification-service
      SERVICE_VERIFICATION_PORT: ${VERIFICATION_SERVER_PORT:-8086}
      CARD_REQUEST_VERIFICATION_EXPIRATION_MINUTES: ${CARD_REQUEST_VERIFICATION_EXPIRATION_MINUTES:-15}
      CARD_CREATION_AUTOMATIC_DEFAULT_LIMIT: ${CARD_CREATION_AUTOMATIC_DEFAULT_LIMIT:-1000000}
      JWT_SECRET: ${JWT_SECRET}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: cardService
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_card:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${CARD_SERVER_PORT:-8087}"
    networks:
      - banka-network
    volumes:
      - card-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${CARD_SERVER_PORT:-8087}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Stock Service
  stock-service:
    build:
      context: ..
      dockerfile: stock-service/Dockerfile
      args:
        SERVER_PORT: ${STOCK_SERVICE_PORT:-8090}
    container_name: stock-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STOCK_SERVICE_HOST: 0.0.0.0
      STOCK_SERVICE_PORT: ${STOCK_SERVICE_PORT:-8090}
      SERVER_PORT: ${STOCK_SERVICE_PORT:-8090}
      STOCK_DB_HOST: postgres_stock
      STOCK_DB_PORT: 5432
      STOCK_DB_NAME: ${STOCK_DB_NAME:-stock_db}
      STOCK_DB_USER: ${STOCK_DB_USER:-postgres}
      STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD:-postgres}
      STOCK_EXCHANGE_SERVICE_URL: ${STOCK_EXCHANGE_SERVICE_URL:-http://exchange-service:${EXCHANGE_SERVER_PORT:-8085}}
      STOCK_MARKET_DATA_BASE_URL: ${STOCK_MARKET_DATA_BASE_URL:-https://www.alphavantage.co}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: stock-service
      LOGGING_FILE_PATH: /var/log/banka
    depends_on:
      postgres_stock:
        condition: service_healthy
      otel-collector:
        condition: service_started
    expose:
      - "${STOCK_SERVICE_PORT:-8090}"
    networks:
      - banka-network
    volumes:
      - stock-service-logs:/var/log/banka
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${STOCK_SERVICE_PORT:-8090}/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: banka_api_gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-80}:80"
    env_file:
      - .env
    environment:
      SERVER_PORT: ${USER_SERVER_PORT:-8081}
      CLIENT_SERVICE_PORT: ${CLIENT_SERVER_PORT:-8083}
      ACCOUNT_SERVICE_PORT: ${ACCOUNT_SERVER_PORT:-8084}
      TRANSFER_SERVICE_PORT: ${TRANSFER_SERVICE_PORT:-8085}
      EXCHANGE_SERVER_PORT: ${EXCHANGE_SERVER_PORT:-8085}
      VERIFICATION_SERVER_PORT: ${VERIFICATION_SERVER_PORT:-8086}
      TRANSACTION_SERVER_PORT: ${TRANSACTION_SERVER_PORT:-8087}
      CARD_SERVICE_PORT: ${CARD_SERVER_PORT:-8087}
      STOCK_SERVICE_PORT: ${STOCK_SERVICE_PORT:-8090}
    depends_on:
      employee-service:
        condition: service_healthy
      client-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      card-service:
        condition: service_healthy
      exchange-service:
        condition: service_healthy
      verification-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      stock-service:
        condition: service_healthy
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/gateway-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

