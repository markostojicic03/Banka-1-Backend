openapi: 3.1.0
info:
  title: User Service API
  description: API for user and authentication management
  version: "1.0"
servers:
  - url: http://localhost:8082
    description: Generated server url
security:
  - bearerAuth: []
paths:
  /employees/{id}:
    put:
      tags:
        - crud-controller
      summary: Update employee by id
      operationId: updateEmployee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdateRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EmployeeResponseDto"
    delete:
      tags:
        - crud-controller
      summary: Delete employee by id
      operationId: deleteEmployee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
  /employees/edit:
    put:
      tags:
        - crud-controller
      summary: Edit employee
      operationId: editEmployee
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeEditRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EmployeeResponseDto"
  /employees:
    get:
      tags:
        - crud-controller
      summary: Search employees
      operationId: searchEmployees
      parameters:
        - name: ime
          in: query
          required: false
          schema:
            type: string
        - name: prezime
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
        - name: pozicija
          in: query
          required: false
          schema:
            type: string
        - name: departman
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
            maximum: 100
            minimum: 1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageEmployeeResponseDto"
    post:
      tags:
        - crud-controller
      summary: Create employee
      operationId: createEmployee
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeCreateRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/EmployeeResponseDto"
  /auth/resetPassword:
    post:
      tags:
        - auth-controller
      summary: Reset password
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /auth/resend-activation:
    post:
      tags:
        - auth-controller
      summary: Resend activation email
      operationId: resendActivation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendActivationDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /auth/refresh:
    post:
      tags:
        - auth-controller
      summary: Refresh access token
      operationId: refresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenResponseDto"
  /auth/login:
    post:
      tags:
        - auth-controller
      summary: Login user
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TokenResponseDto"
  /auth/forgot-password:
    post:
      tags:
        - auth-controller
      summary: Send forgot password email
      operationId: forgotPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /auth/activate:
    post:
      tags:
        - auth-controller
      summary: Activate account
      operationId: activate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /employees/search:
    get:
      tags:
        - crud-controller
      summary: Global employee search
      operationId: globalSearchEmployees
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageEmployeeResponseDto"
  /auth/checkResetPassword:
    get:
      tags:
        - auth-controller
      summary: Validate reset password token
      operationId: checkResetPassword
      parameters:
        - name: confirmationToken
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int64
  /auth/checkActivate:
    get:
      tags:
        - auth-controller
      summary: Validate activation token
      operationId: checkActivate
      parameters:
        - name: confirmationToken
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: integer
                format: int64
  /auth/logout:
    delete:
      tags:
        - auth-controller
      summary: Logout user
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequestDto"
        required: true
      responses:
        "200":
          description: OK
components:
  schemas:
    EmployeeUpdateRequestDto:
      type: object
      properties:
        ime:
          type: string
          maxLength: 2147483647
          minLength: 1
        prezime:
          type: string
          maxLength: 2147483647
          minLength: 1
        brojTelefona:
          type: string
          pattern: "^\\+?[0-9]{8,15}$"
        adresa:
          type: string
        pozicija:
          type: string
          maxLength: 2147483647
          minLength: 1
        departman:
          type: string
          maxLength: 2147483647
          minLength: 1
        aktivan:
          type: boolean
        role:
          type: string
          enum:
            - BASIC
            - AGENT
            - SUPERVISOR
            - ADMIN
    EmployeeResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ime:
          type: string
        prezime:
          type: string
        email:
          type: string
        username:
          type: string
        pozicija:
          type: string
        departman:
          type: string
        aktivan:
          type: boolean
        role:
          type: string
          enum:
            - BASIC
            - AGENT
            - SUPERVISOR
            - ADMIN
    EmployeeEditRequestDto:
      type: object
      properties:
        ime:
          type: string
        prezime:
          type: string
        brojTelefona:
          type: string
        adresa:
          type: string
        pozicija:
          type: string
        departman:
          type: string
    EmployeeCreateRequestDto:
      type: object
      properties:
        ime:
          type: string
          minLength: 1
        prezime:
          type: string
          minLength: 1
        datumRodjenja:
          type: string
          format: date
        pol:
          type: string
          enum:
            - M
            - Z
        email:
          type: string
          format: email
          minLength: 1
        brojTelefona:
          type: string
          pattern: "^\\+?[0-9]{8,15}$"
        adresa:
          type: string
        username:
          type: string
          minLength: 1
        pozicija:
          type: string
          minLength: 1
        departman:
          type: string
          minLength: 1
        role:
          type: string
          enum:
            - BASIC
            - AGENT
            - SUPERVISOR
            - ADMIN
      required:
        - datumRodjenja
        - departman
        - email
        - ime
        - pol
        - pozicija
        - prezime
        - role
        - username
    ActivateDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        confirmationToken:
          type: string
          maxLength: 43
          minLength: 43
        password:
          type: string
          maxLength: 32
          minLength: 8
          pattern: "^(?=(?:.*\\d){2,})(?=.*[a-z])(?=.*[A-Z])(?=\\S+$).*$"
      required:
        - confirmationToken
        - id
        - password
    ResendActivationDto:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
        - email
    RefreshTokenRequestDto:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
      required:
        - refreshToken
    TokenResponseDto:
      type: object
      properties:
        jwt:
          type: string
        refreshToken:
          type: string
        role:
          type: string
          enum:
            - BASIC
            - AGENT
            - SUPERVISOR
            - ADMIN
        permissions:
          type: array
          items:
            type: string
            enum:
              - BANKING_BASIC
              - CLIENT_MANAGE
              - SECURITIES_TRADE_LIMITED
              - SECURITIES_TRADE_UNLIMITED
              - TRADE_UNLIMITED
              - OTC_TRADE
              - FUND_AGENT_MANAGE
              - EMPLOYEE_MANAGE_ALL
          uniqueItems: true
    LoginRequestDto:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - email
        - password
    ForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
        - email
    PageEmployeeResponseDto:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/EmployeeResponseDto"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        paged:
          type: boolean
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
    LogoutRequestDto:
      type: object
      properties:
        refreshToken:
          type: string
          minLength: 1
      required:
        - refreshToken
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
